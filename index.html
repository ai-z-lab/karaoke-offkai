<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fdf6ec">
<title>カラオケオフ会 参加管理</title>
<style>
:root {
  --bg:      #fdf6ec;
  --card:    #ffffff;
  --border:  #f0d9c0;
  --accent:  #e05c2a;   /* terracotta orange */
  --accent2: #f5a623;   /* mango orange      */
  --text:    #2c1a0e;
  --muted:   #8a6a50;
  --r:       14px;
  --rsm:     9px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
               'Noto Sans JP', Meiryo, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  background:
    radial-gradient(ellipse 70% 40% at 70% 0%, rgba(224,92,42,.10) 0%, transparent 70%),
    radial-gradient(ellipse 60% 35% at 20% 100%, rgba(245,166,35,.08) 0%, transparent 65%),
    var(--bg);
}

.page {
  max-width: 480px;
  margin: 0 auto;
  padding: 40px 20px 60px;
}

.page-logo { font-size: 44px; text-align: center; margin-bottom: 8px; }
.page-title {
  font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 8px;
  background: linear-gradient(100deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.page-sub {
  font-size: 12px; color: var(--muted); text-align: center;
  margin-bottom: 32px; line-height: 1.7;
}

.event-list { display: flex; flex-direction: column; gap: 12px; }

.event-card {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 18px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  text-decoration: none; color: inherit;
  transition: transform .15s, box-shadow .15s;
}
.event-card:active { transform: scale(.98); }
.event-card:hover {
  box-shadow: 0 4px 14px rgba(224,92,42,.14);
  border-color: rgba(224,92,42,.35);
}
.event-card-body { min-width: 0; }
.event-card-title {
  font-size: 16px; font-weight: 700; color: var(--text);
  margin-bottom: 4px;
}
.event-card-date { font-size: 12px; color: var(--muted); }
.event-card-arrow {
  font-size: 20px; font-weight: 700; color: var(--accent);
  flex-shrink: 0;
}

.empty-state {
  text-align: center; color: var(--muted); font-size: 13px; padding: 32px 0;
}
</style>
</head>
<body>

<div class="page">
  <div class="page-logo">🎤</div>
  <div class="page-title">カラオケオフ会 参加管理</div>
  <div class="page-sub">開催回を選んでください</div>

  <div class="event-list">
    <a class="event-card" href="event/1/index.html">
      <div class="event-card-body">
        <div class="event-card-title">第一回 カラオケオフ会</div>
        <div class="event-card-date">7/13</div>
      </div>
      <div class="event-card-arrow">→</div>
    </a>

    <!--
      第二回以降を追加する場合は、event/2/ などに現在の参加管理アプリを
      配置した上で、下記のようにカードを追加してください。

    <a class="event-card" href="event/2/index.html">
      <div class="event-card-body">
        <div class="event-card-title">第二回 カラオケオフ会</div>
        <div class="event-card-date">日付未定</div>
      </div>
      <div class="event-card-arrow">→</div>
    </a>
    -->
  </div>
</div>

</body>
</html>
